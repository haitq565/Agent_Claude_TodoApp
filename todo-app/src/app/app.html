<mat-sidenav-container class="app-container">

  <!-- Sidebar -->
  <mat-sidenav
    #sidenav
    [opened]="sidenavOpen()"
    mode="side"
    class="app-sidenav"
  >
    <!-- Brand -->
    <div class="sidenav-brand">
      <mat-icon class="brand-icon">task_alt</mat-icon>
      <span class="brand-name">Todo Admin</span>
    </div>

    <!-- Nav Items -->
    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-nav-item"
          class="nav-item"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <!-- Footer -->
    <div class="sidenav-footer">
      <span class="version-text">v1.0.0 · Angular 21</span>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="app-content">

    <!-- Toolbar -->
    <mat-toolbar color="primary" class="app-toolbar">
      <button
        mat-icon-button
        (click)="sidenav.toggle(); toggleSidenav()"
        matTooltip="Ẩn/Hiện menu"
        aria-label="Toggle sidebar"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ appTitle() }}</span>
      <span class="toolbar-spacer"></span>
      <mat-icon matTooltip="JSON Server port 3000">cloud_done</mat-icon>
    </mat-toolbar>

    <!-- Global Loading Bar -->
    @if (loading()) {
      <mat-progress-bar mode="indeterminate" class="global-loading-bar" />
    }

    <!-- Page Content -->
    <main class="app-main">
      <router-outlet />
    </main>

  </mat-sidenav-content>
</mat-sidenav-container>
